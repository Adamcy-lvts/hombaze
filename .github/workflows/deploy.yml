name: Deploy

on:
  push:
    branches:
      - main     # Deploys to production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST_DEVCENTRIC }}
          username: ${{ secrets.DO_USER_DEVCENTRIC }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEVCENTRIC }}
          passphrase: ${{ secrets.SSH_PASSPHRASE_DEVCENTRIC }}
          port: 22
          script: |
            cd /home/forge/homebaze.live/current
            git fetch origin main
            STORAGE_REAL=$([ -L storage ] && readlink storage || echo "")
            [ -n "$STORAGE_REAL" ] && rm storage
            git reset --hard origin/main
            [ -n "$STORAGE_REAL" ] && ln -sfn "$STORAGE_REAL" storage || true
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            php artisan queue:restart